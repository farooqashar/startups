name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'codebases/startup-knowledge-website/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Copy website files to root
        run: |
          cp codebases/startup-knowledge-website/index.html .
          rm -rf css js
          cp -r codebases/startup-knowledge-website/css .
          cp -r codebases/startup-knowledge-website/js .

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html css/ js/
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy: sync website from codebases/ to root [skip ci]"
          git push
